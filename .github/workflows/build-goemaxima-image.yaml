name: Build Goemaxima Image
on:
  push:
    branches: [DBP-1988-maxima]

  workflow_dispatch:
    inputs:
      stack-version:
        description: "Stack version to build the goemaxima server image for (blank to use latest available in versions file)"
        default: ""
        type: string

      goemaxima-ref:
        description: "Ref of mathinstitut/goemaxima to build (branch, tag, SHA or blank to use latest available tag)"
        type: string
        default: "master"

concurrency:
  group: dbp-moodle-goemaxima-image
  cancel-in-progress: true

jobs:
  get_build_args:
    runs-on: ubuntu-latest
    outputs:
      MAXIMA_VERSION:       ${{ steps.vars.outputs.MAXIMA_VERSION }}
      SBCL_VERSION:         ${{ steps.vars.outputs.SBCL_VERSION }}
      LIB_PATH:             ${{ steps.vars.outputs.LIB_PATH }}
      LATEST_STACK_VERSION: ${{ steps.latest.outputs.LATEST_STACK_VERSION }}
    steps:
      - name: Checkout goemaxima
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          repository: mathinstitut/goemaxima
          ref: ${{ inputs['goemaxima-ref'] || 'master' }}
          path: goemaxima

      - name: Extract latest stack version
        id: latest
        shell: bash
        run: |
          set -euo pipefail
          cd goemaxima
          # Grab the last non-comment, non-empty line and print the first field from the versions file
          LATEST="$(awk '!/^#/ && NF { last=$1 } END { print last }' versions)"
          if [ -z "${LATEST:-}" ]; then
            echo "Could not determine latest stack version from 'versions' file" >&2
            exit 1
          fi
          echo "LATEST_STACK_VERSION=$LATEST" >> "$GITHUB_OUTPUT"

      - name: Extract versions for ${{ inputs['stack-version'] || steps.latest.outputs.LATEST_STACK_VERSION }}
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          cd goemaxima

          STACK="${{ inputs['stack-version'] || steps.latest.outputs.LATEST_STACK_VERSION }}"
          # Find the line for this stack version in the 'versions' file
          LINE="$(awk -v s="$STACK" '$1==s{print $0}' versions || true)"
          if [ -z "$LINE" ]; then
            echo "Requested stack version '$STACK' not found in versions file" >&2
            exit 1
          fi

          MAXIMA_VERSION="$(echo "$LINE" | cut -f2)"
          SBCL_VERSION="$(echo "$LINE"   | cut -f3)"
          LIB_PATH="stack/${STACK}/maxima"

          # Job outputs for downstream jobs
          echo "MAXIMA_VERSION=$MAXIMA_VERSION"           >> "$GITHUB_OUTPUT"
          echo "SBCL_VERSION=$SBCL_VERSION"               >> "$GITHUB_OUTPUT"
          echo "LIB_PATH=stack/${STACK}/maxima"           >> "$GITHUB_OUTPUT"

          echo "::group::Build argument summary"
          echo "STACK:            $STACK"
          echo "MAXIMA_VERSION:   $MAXIMA_VERSION"
          echo "SBCL_VERSION:     $SBCL_VERSION"
          echo "LIB_PATH:         $LIB_PATH"
          echo "::endgroup::"

  build_image_and_push:
    permissions:
      packages: write
      security-events: write
      contents: read
    needs: get_build_args
    uses: dBildungsplattform/dbp-github-workflows/.github/workflows/image-publish-trivy.yaml@8
    with:
      image_name: "goemaxima"
      run_trivy_scan: true
      image_tag_generation: specified
      image_tag: "${{ inputs['stack-version'] || needs.get_build_args.outputs.LATEST_STACK_VERSION }}-1.2.0" # ${{ inputs['goemaxima-ref'] || 'master' }}
      add_latest_tag: false
      container_registry: "ghcr.io"
      fail_on_vulnerabilites: false
      context: "https://github.com/mathinstitut/goemaxima.git#1.2.0" # ${{ inputs['goemaxima-ref'] || 'master' }}
      build_args: |
        MAXIMA_VERSION=${{ needs.get_build_args.outputs.MAXIMA_VERSION }}
        SBCL_VERSION=${{ needs.get_build_args.outputs.SBCL_VERSION }}
        LIB_PATH=${{ needs.get_build_args.outputs.LIB_PATH }}
